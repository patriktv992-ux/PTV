<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Odpočet do konce školního roku</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(0,0,0,0.25);
            padding: 50px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2em;
        }
        #countdown {
            font-size: 2.8em;
            font-weight: bold;
        }
        .sub {
            margin-top: 15px;
            opacity: 0.8;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏳ Odpočet do konce školního roku</h1>
        <div id="countdown"></div>
        <div class="sub">26. 6. 2026</div>
    </div>

    <script>
        const targetDate = new Date("2026-06-26T00:10:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("countdown").innerHTML = "🎉 Time Ended";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("countdown").innerHTML =
                `${days} dní ${hours} hodin ${minutes} minut ${seconds} sekund`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
